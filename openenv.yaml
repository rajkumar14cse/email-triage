name: email-triage-env
version: "1.0.0"
description: Real-world email triage environment for AI agent training.
tags:
  - openenv
  - email
  - triage
  - real-world

tasks:
  - id: task_easy_classify
    difficulty: easy
    max_steps: 10
    reward_range: [0.0, 1.0]
  - id: task_medium_triage
    difficulty: medium
    max_steps: 10
    reward_range: [0.0, 1.0]
  - id: task_hard_full_triage
    difficulty: hard
    max_steps: 10
    reward_range: [0.0, 1.0]

api:
  reset: POST /reset
  step: POST /step
  state: GET /state

inference:
  script: inference.py
  required_env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN