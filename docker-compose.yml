version: '3.8'

services:
  api:
    build: .
    container_name: email-triage-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN}
      - API_BASE_URL=${API_BASE_URL:-https://router.huggingface.co/openai/v1}
      - MODEL_NAME=${MODEL_NAME:-google/flan-t5-large}
      - ENV_URL=http://localhost:8000
    volumes:
      - ./baseline_results.json:/app/baseline_results.json
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
